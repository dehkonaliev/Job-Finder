<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - WorkBoard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        premium: {
                            gold: '#d4af37',
                            goldHover: '#c5a02d',
                            obsidian: '#080a10',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #080a10; }
        .glass-panel { background: rgba(17, 22, 37, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="text-white">

    <div class="min-h-screen flex items-center justify-center py-12 px-6">
        <div class="w-full max-w-md">
            <!-- Brand/Header -->
            <div class="text-center mb-10">
                <div class="text-[#d4af37] text-2xl mb-2">♦</div>
                <h1 class="text-3xl font-serif font-bold text-white mb-2">Welcome Back</h1>
                <p class="text-gray-400">Sign in to your employer workspace</p>
            </div>

            <!-- Login Form -->
            <div class="glass-panel rounded-2xl p-8 border border-white/5 shadow-2xl">
                <form method="POST" class="space-y-6">
                    {% csrf_token %}
                    <!-- Note: Add your {% csrf_token %} back here if running in Django -->
                    
                    <div class="flex flex-col space-y-2">
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Email</label>
                        <input type="text" name="username"
                               class="w-full px-4 py-3 bg-[#0c101b] border border-white/5 rounded-lg focus:outline-none focus:border-[#d4af37] focus:bg-white/5 text-white text-sm transition-all placeholder:text-gray-600"
                               placeholder="username">
                    </div>

                    <div class="flex flex-col space-y-2">
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Password</label>
                        <input type="password" name="password"
                               class="w-full px-4 py-3 bg-[#0c101b] border border-white/5 rounded-lg focus:outline-none focus:border-[#d4af37] focus:bg-white/5 text-white text-sm transition-all placeholder:text-gray-600"
                               placeholder="••••••••">
                    </div>

                    <button type="submit" 
                            class="w-full py-3 px-6 bg-gradient-to-r from-[#d4af37] to-[#cca055] hover:from-[#f0caa0] hover:to-[#e5b869] text-[#080a10] font-bold text-sm rounded-lg transition-all duration-200 shadow-lg shadow-[#d4af37]/10">
                        Sign In
                    </button>
                </form>

                <div class="mt-8 pt-6 border-t border-white/5 text-center text-sm text-gray-500">
                    Don't have an account? 
                    <a href="{% url 'sign-up' %}" class="text-[#d4af37] hover:text-[#c5a02d] font-medium transition">Register here</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
