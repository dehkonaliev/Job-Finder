{% extends 'base.html' %}

{% block title %}Vakansiyani o'chirish{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0">Vakansiyani o'chirish</h5>
            </div>
            <div class="card-body">
                <p>
                    <strong>{{ job.title }}</strong> vakansiyasini o'chirishni tasdiqlaysizmi?
                </p>
                <p class="text-danger">Bu amalni qaytarib bo'lmaydi!</p>

                <form method="POST">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">Ha, o'chirish</button>
                        <a href="{% url 'job_detail' job.pk %}" class="btn btn-secondary">
                            Bekor qilish
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
