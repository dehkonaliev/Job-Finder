<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Embedding all styles directly into the HTML file */
        .premium-input {
            width: 100%;
            background-color: #0f172a !important;
            border: 1px solid #334155 !important;
            color: white !important;
            padding: 12px 16px !important;
            border-radius: 8px !important;
            outline: none !important;
        }
        .premium-input:focus {
            border-color: #3b82f6 !important;
        }
        .premium-label {
            font-size: 10px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 6px;
            margin-left: 4px;
            display: block;
        }
        .signup-card {
            background-color: #0b101d;
            border: 1px solid #1e293b;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-md">
        <h1 class="text-center text-xl font-medium mb-8 text-slate-300">Join our premium community today</h1>

        <div class="signup-card">
            <form method="POST" class="space-y-5">
                {% csrf_token %}
                
                {% for field in form %}
                <div class="flex flex-col">
                    <label class="premium-label">{{ field.label }}</label>
                    
                    {{ field }}
                    
                    {% if field.errors %}
                        <p class="text-red-400 text-[10px] mt-1">{{ field.errors.0 }}</p>
                    {% endif %}
                </div>
                {% endfor %}

                <button type="submit" class="w-full py-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold rounded-lg transition-all shadow-lg mt-4">
                    Sign Up
                </button>
            </form>

            <div class="mt-6 text-center text-sm text-slate-500">
                Already have an account? 
                <a href="{% url 'login' %}" class="text-blue-400 hover:text-blue-300 font-medium">Sign In</a>
            </div>
        </div>
    </div>

</body>
</html>
